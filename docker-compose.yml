version: '3.8'
services:
  mysql:
    image: mysql:8
    container_name: mi-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: database
      MYSQL_USER: usuario
      MYSQL_PASSWORD: contraseña
    ports:
      - "3307:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      
  ev_central:
    build: ./central
    container_name: ev-central
    depends_on:
      - mysql
    ports:
      - "5000:5000"  # o el puerto que use tu socket
    environment:
      DB_HOST: mysql          # ← nombre del servicio MySQL (Docker DNS lo resuelve)
      DB_PORT: 3306
      DB_USER: usuario
      DB_PASSWORD: contraseña
      DB_NAME: database
