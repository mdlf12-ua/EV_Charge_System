services:
  # ======== ENGINES ========
  engine1:
    tty: true
    stdin_open: true
    build:
      context: ../engine
      dockerfile: Dockerfile
    container_name: engine1
    ports:
      - "6000:6000"
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      ENGINE_NAME: engine1
      TLS_ENABLED: "1"
      TLS_CERT: /app/certs/certServ.pem
    volumes:
      - ./logs:/app/logs
      - ../certs:/app/certs:ro

